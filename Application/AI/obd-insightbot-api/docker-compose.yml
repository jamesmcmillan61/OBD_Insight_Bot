# OBD InsightBot API - Docker Compose
# ====================================
# Run with: docker-compose up -d

version: '3.8'

services:
  # Main API service (lightweight - no LLM)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obd-insightbot-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # API with LLM support (use this if you need the Granite model)
  api-llm:
    build:
      context: .
      dockerfile: Dockerfile.llm
    container_name: obd-insightbot-api-llm
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
    restart: unless-stopped
    volumes:
      # Mount cache for model persistence
      - huggingface-cache:/home/appuser/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 120s  # Longer startup for model loading
    deploy:
      resources:
        limits:
          memory: 4G  # LLM needs more memory
        reservations:
          memory: 2G
    profiles:
      - llm  # Only starts with: docker-compose --profile llm up

volumes:
  huggingface-cache:
